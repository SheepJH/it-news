<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{ question | replace('\n', ' ') }}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top {
    display: flex; flex-direction: column;
  }
  .tag {
    display: inline-block;
    background: #111; color: white;
    font-size: 22px; font-weight: 500;
    padding: 10px 24px; border-radius: 6px;
    letter-spacing: 2px;
    align-self: flex-start;
  }
  .series-meta {
    color: #999; font-size: 24px;
    margin-top: 28px; letter-spacing: 1px;
  }
  .middle .q-label {
    color: #CCC; font-size: 30px; margin-bottom: 18px;
  }
  .middle .question {
    color: #111; font-size: 88px; font-weight: 500;
    line-height: 1.2; letter-spacing: -0.03em;
    white-space: pre-line;
  }
  .middle .subtitle {
    color: #666; font-size: 30px; margin-top: 40px;
    line-height: 1.55; white-space: pre-line;
  }
  .bottom {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 22px; color: #999;
  }
  .bottom .swipe { color: #111; font-weight: 500; }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="tag">EXPLAINER</div>
      <div class="series-meta">{{ series_meta }}</div>
    </div>
    <div class="middle">
      <div class="q-label">Q.</div>
      <div class="question">{{ question }}</div>
      <div class="subtitle">{{ subtitle }}</div>
    </div>
    <div class="bottom">
      <span>@{{ handle }}</span>
      <span class="swipe">SWIPE →</span>
    </div>
  </div>
</body>
</html>
