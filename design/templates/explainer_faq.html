<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label {
    color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500;
  }
  .page-num {
    color: #999; font-size: 22px;
  }
  .headline {
    color: #111; font-size: 48px; font-weight: 500;
    margin-bottom: 56px; letter-spacing: -0.02em;
  }
  .faqs {
    display: flex; flex-direction: column; gap: 36px;
  }
  .faq-item {
    border-left: 4px solid #FFE566;
    padding-left: 32px;
  }
  .faq-q {
    display: flex; gap: 14px; align-items: baseline;
    margin-bottom: 12px;
  }
  .q-label {
    color: #FFE566; font-size: 28px; font-weight: 500;
    flex-shrink: 0;
  }
  .q-text {
    color: #111; font-size: 32px; font-weight: 500;
    line-height: 1.35;
  }
  .a-text {
    color: #555; font-size: 28px; line-height: 1.5;
    padding-left: 42px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div>
      <div class="headline">{{ headline }}</div>
      <div class="faqs">
        {% for faq in faqs %}
        <div class="faq-item">
          <div class="faq-q">
            <span class="q-label">Q.</span>
            <span class="q-text">{{ faq.q }}</span>
          </div>
          <div class="a-text">{{ faq.a }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
    <div></div>
  </div>
</body>
</html>
