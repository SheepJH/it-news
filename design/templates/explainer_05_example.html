<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 80px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label {
    color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500;
  }
  .page-num {
    color: #999; font-size: 22px;
  }
  .headline {
    color: #111; font-size: 48px; font-weight: 500;
    margin-bottom: 46px; letter-spacing: -0.02em;
  }
  .items {
    display: flex; flex-direction: column; gap: 20px;
  }
  .item {
    display: flex; justify-content: space-between; align-items: center;
    background: #FAFAFA; border-radius: 16px;
    padding: 30px 36px;
  }
  .item-title {
    color: #111; font-size: 32px; font-weight: 500;
    margin-bottom: 6px;
  }
  .item-desc {
    color: #777; font-size: 24px;
  }
  .item-tag {
    font-size: 22px; font-weight: 500;
    padding: 8px 18px; border-radius: 8px;
    letter-spacing: 1px;
  }
  .tag-LIVE { color: #2D7A3E; background: #F0F7F0; }
  .tag-NEW { color: #BA7517; background: #FAEEDA; }
  .footer { color: #999; font-size: 22px; }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div>
      <div class="headline">{{ headline }}</div>
      <div class="items">
        {% for item in items %}
        <div class="item">
          <div>
            <div class="item-title">{{ item.title }}</div>
            <div class="item-desc">{{ item.desc }}</div>
          </div>
          <div class="item-tag tag-{{ item.tag }}">{{ item.tag }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
    <div class="footer">@{{ handle }}</div>
  </div>
</body>
</html>
