<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 80px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label {
    color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500;
  }
  .page-num {
    color: #999; font-size: 22px;
  }
  .headline {
    color: #111; font-size: 48px; font-weight: 500;
    margin-bottom: 60px; letter-spacing: -0.02em;
  }
  .steps {
    display: flex; flex-direction: column; gap: 40px;
  }
  .step {
    display: flex; gap: 32px; align-items: flex-start;
  }
  .step-num {
    min-width: 72px; height: 72px;
    background: #111; color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 500;
  }
  .step-title {
    color: #111; font-size: 38px; font-weight: 500;
    margin-bottom: 8px; letter-spacing: -0.01em;
  }
  .step-desc {
    color: #777; font-size: 28px; line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div>
      <div class="headline">{{ headline }}</div>
      <div class="steps">
        {% for step in steps %}
        <div class="step">
          <div class="step-num">{{ loop.index }}</div>
          <div>
            <div class="step-title">{{ step.title }}</div>
            <div class="step-desc">{{ step.desc }}</div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</body>
</html>
