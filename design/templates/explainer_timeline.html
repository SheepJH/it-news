<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label {
    color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500;
  }
  .page-num {
    color: #999; font-size: 22px;
  }
  .headline {
    color: #111; font-size: 48px; font-weight: 500;
    margin-bottom: 56px; letter-spacing: -0.02em;
  }
  .timeline {
    display: flex; flex-direction: column; gap: 0;
  }
  .event {
    display: flex; gap: 40px; align-items: flex-start;
    padding-bottom: 40px;
    position: relative;
  }
  .event:not(:last-child)::before {
    content: '';
    position: absolute;
    left: 168px;
    top: 36px;
    bottom: 0;
    width: 2px;
    background: #E8E8E8;
  }
  .event-date {
    min-width: 130px;
    color: #999; font-size: 22px;
    padding-top: 6px;
    text-align: right;
  }
  .event-dot {
    min-width: 16px; height: 16px;
    background: #FFE566;
    border-radius: 50%;
    margin-top: 10px;
    position: relative;
    z-index: 1;
  }
  .event-text {
    color: #111; font-size: 32px; font-weight: 500;
    line-height: 1.4;
    padding-top: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div>
      <div class="headline">{{ headline }}</div>
      <div class="timeline">
        {% for ev in events %}
        <div class="event">
          <div class="event-date">{{ ev.date }}</div>
          <div class="event-dot"></div>
          <div class="event-text">{{ ev.event }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
    <div></div>
  </div>
</body>
</html>
