<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 80px;
    display: flex; flex-direction: column; gap: 48px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label {
    color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500;
  }
  .page-num {
    color: #999; font-size: 22px;
  }
  .headline {
    color: #111; font-size: 46px; font-weight: 500;
    letter-spacing: -0.02em;
  }
  .boxes {
    display: flex; flex-direction: column; gap: 20px; flex: 1;
  }
  .box {
    border-radius: 20px; padding: 36px 44px;
    flex: 1; display: flex; flex-direction: column; gap: 18px;
  }
  .box-before { background: #FFF5F5; }
  .box-after  { background: #F0F7F0; }
  .box-label {
    font-size: 22px; font-weight: 500; letter-spacing: 2px;
  }
  .label-before { color: #C44536; }
  .label-after  { color: #2D7A3E; }
  .items {
    display: flex; flex-direction: column; gap: 14px;
  }
  .item {
    display: flex; align-items: center; gap: 20px;
  }
  .item-marker {
    font-size: 26px; font-weight: 500; flex-shrink: 0; line-height: 1;
  }
  .marker-before { color: #C44536; }
  .marker-after  { color: #2D7A3E; }
  .item-text {
    font-size: 30px; line-height: 1.4;
  }
  .before .item-text { color: #555; }
  .after  .item-text { color: #111; font-weight: 500; }
  .box-note {
    font-size: 22px; padding-top: 4px;
  }
  .note-before { color: #C44536; opacity: 0.7; }
  .note-after  { color: #2D7A3E; }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div class="headline">{{ headline }}</div>
    <div class="boxes">
      <div class="box box-before">
        <div class="box-label label-before">{{ before_label }}</div>
        <div class="items before">
          {% for item in before_items %}
          <div class="item">
            <span class="item-marker marker-before">✗</span>
            <span class="item-text">{{ item }}</span>
          </div>
          {% endfor %}
        </div>
        <div class="box-note note-before">{{ before_note }}</div>
      </div>
      <div class="box box-after">
        <div class="box-label label-after">{{ after_label }}</div>
        <div class="items after">
          {% for item in after_chain %}
          <div class="item">
            <span class="item-marker marker-after">✓</span>
            <span class="item-text">{{ item }}</span>
          </div>
          {% endfor %}
        </div>
        <div class="box-note note-after">{{ after_note }}</div>
      </div>
    </div>
  </div>
</body>
</html>
