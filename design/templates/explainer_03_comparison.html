<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 80px;
    display: flex; flex-direction: column; gap: 56px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label { color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500; }
  .page-num      { color: #999; font-size: 22px; }
  .headline {
    color: #111; font-size: 46px; font-weight: 500; letter-spacing: -0.02em;
  }
  .columns {
    display: flex; gap: 24px;
  }
  .col {
    flex: 1; border-radius: 20px; padding: 40px 44px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .col-before { background: #FFF5F5; }
  .col-after  { background: #F0F7F0; }
  .col-label {
    font-size: 22px; font-weight: 500; letter-spacing: 2px;
  }
  .label-before { color: #C44536; }
  .label-after  { color: #2D7A3E; }
  .items { display: flex; flex-direction: column; gap: 20px; }
  .item  { display: flex; align-items: flex-start; gap: 18px; }
  .marker {
    font-size: 28px; font-weight: 500; flex-shrink: 0; line-height: 1.3;
  }
  .marker-before { color: #C44536; }
  .marker-after  { color: #2D7A3E; }
  .item-text { font-size: 30px; line-height: 1.45; }
  .col-before .item-text { color: #666; }
  .col-after  .item-text { color: #111; font-weight: 500; }
  .col-note { font-size: 22px; margin-top: 4px; }
  .note-before { color: #C44536; opacity: 0.7; }
  .note-after  { color: #2D7A3E; }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div class="headline">{{ headline }}</div>
    <div class="columns">
      <div class="col col-before">
        <div class="col-label label-before">{{ before_label }}</div>
        <div class="items">
          {% for item in before_items %}
          <div class="item">
            <span class="marker marker-before">✗</span>
            <span class="item-text">{{ item }}</span>
          </div>
          {% endfor %}
        </div>
        <div class="col-note note-before">{{ before_note }}</div>
      </div>
      <div class="col col-after">
        <div class="col-label label-after">{{ after_label }}</div>
        <div class="items">
          {% for item in after_chain %}
          <div class="item">
            <span class="marker marker-after">✓</span>
            <span class="item-text">{{ item }}</span>
          </div>
          {% endfor %}
        </div>
        <div class="col-note note-after">{{ after_note }}</div>
      </div>
    </div>
  </div>
</body>
</html>
