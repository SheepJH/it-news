<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label {
    color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500;
  }
  .page-num {
    color: #999; font-size: 22px;
  }
  .headline {
    color: #111; font-size: 48px; font-weight: 500;
    margin-bottom: 70px; letter-spacing: -0.02em;
  }
  .stats {
    display: flex; justify-content: space-between; gap: 32px;
  }
  .stat {
    flex: 1;
    border-top: 4px solid #FFE566;
    padding-top: 36px;
  }
  .stat-value {
    color: #111; font-size: 80px; font-weight: 500;
    letter-spacing: -0.04em; line-height: 1;
    margin-bottom: 16px;
  }
  .stat-label {
    color: #111; font-size: 28px; font-weight: 500;
    margin-bottom: 10px;
  }
  .stat-note {
    color: #999; font-size: 22px; line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div>
      <div class="headline">{{ headline }}</div>
      <div class="stats">
        {% for stat in stats %}
        <div class="stat">
          <div class="stat-value">{{ stat.value }}</div>
          <div class="stat-label">{{ stat.label }}</div>
          <div class="stat-note">{{ stat.note }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
    <div></div>
  </div>
</body>
</html>
