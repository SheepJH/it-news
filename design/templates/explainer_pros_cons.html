<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 80px;
    display: flex; flex-direction: column; gap: 56px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label {
    color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500;
  }
  .page-num {
    color: #999; font-size: 22px;
  }
  .headline {
    color: #111; font-size: 46px; font-weight: 500;
    letter-spacing: -0.02em;
  }
  .columns {
    display: flex; gap: 24px; align-items: flex-start;
  }
  .col {
    flex: 1; border-radius: 20px; padding: 36px 32px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .col-pros { background: #F0F7F0; }
  .col-cons { background: #FFF5F5; }
  .col-label {
    font-size: 22px; font-weight: 500; letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .label-pros { color: #2D7A3E; }
  .label-cons { color: #C44536; }
  .col-item {
    display: flex; align-items: flex-start; gap: 14px;
  }
  .item-dot {
    min-width: 10px; height: 10px; border-radius: 50%;
    margin-top: 10px;
  }
  .dot-pros { background: #2D7A3E; }
  .dot-cons { background: #C44536; }
  .item-text {
    color: #333; font-size: 28px; line-height: 1.45;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div class="headline">{{ headline }}</div>
    <div class="columns">
      <div class="col col-pros">
        <div class="col-label label-pros">{{ pros_label }}</div>
        {% for item in pros %}
        <div class="col-item">
          <div class="item-dot dot-pros"></div>
          <div class="item-text">{{ item }}</div>
        </div>
        {% endfor %}
      </div>
      <div class="col col-cons">
        <div class="col-label label-cons">{{ cons_label }}</div>
        {% for item in cons %}
        <div class="col-item">
          <div class="item-dot dot-cons"></div>
          <div class="item-text">{{ item }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</body>
</html>
