<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FAFAFA;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1080px; height: 1080px;
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    padding: 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label {
    color: #999; font-size: 24px; letter-spacing: 2px; font-weight: 500;
  }
  .page-num {
    color: #999; font-size: 22px;
  }
  .quote-block {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    padding: 40px 0;
  }
  .quote-mark {
    color: #FFE566; font-size: 120px; line-height: 0.6;
    margin-bottom: 32px;
    font-family: Georgia, serif;
  }
  .quote-text {
    color: #111; font-size: 58px; font-weight: 500;
    line-height: 1.4; letter-spacing: -0.02em;
    white-space: pre-line;
    margin-bottom: 48px;
  }
  .quote-divider {
    width: 60px; height: 3px; background: #FFE566;
    margin-bottom: 28px;
  }
  .quote-source {
    color: #111; font-size: 28px; font-weight: 500;
    margin-bottom: 12px;
  }
  .quote-context {
    color: #999; font-size: 24px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{ section_label }}</div>
      <div class="page-num">{{ "%02d" | format(page_current) }} / {{ "%02d" | format(page_total) }}</div>
    </div>
    <div class="quote-block">
      <div class="quote-mark">"</div>
      <div class="quote-text">{{ quote }}</div>
      <div class="quote-divider"></div>
      <div class="quote-source">{{ source }}</div>
      {% if context %}<div class="quote-context">{{ context }}</div>{% endif %}
    </div>
    <div></div>
  </div>
</body>
</html>
