<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IT 카드뉴스</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: sans-serif; padding: 24px 16px; }
  h1 { font-size: 1.1rem; color: #FFE566; margin-bottom: 20px; letter-spacing: 1px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 600px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  .card {
    text-decoration: none; color: inherit;
    background: #1a1a1a; border-radius: 10px; overflow: hidden;
    transition: transform 0.15s;
  }
  .card:active { transform: scale(0.97); }
  .thumb { aspect-ratio: 1; overflow: hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .date { font-size: 0.8rem; color: #aaa; padding: 8px 10px; }
</style>
</head>
<body>
  <h1>IT DAILY</h1>
  <div class="grid">
    <a class="card" href="2026-04-18.html">
      <div class="thumb"><img src="2026-04-18/card_01.png" alt="2026-04-18" loading="lazy"></div>
      <div class="date">2026-04-18</div>
    </a>
    <a class="card" href="2026-04-17.html">
      <div class="thumb"><img src="2026-04-17/card_01.png" alt="2026-04-17" loading="lazy"></div>
      <div class="date">2026-04-17</div>
    </a>
  </div>
</body>
</html>
