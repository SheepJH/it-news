<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT 카드뉴스 아카이브</title>
  <style>
    
:root {
  --accent:       #7C3AED;
  --accent-mid:   #6D28D9;
  --accent-light: #EDE9FE;
  --accent-xlight:#F5F3FF;
  --text-1:       #111827;
  --text-2:       #374151;
  --text-3:       #6B7280;
  --text-4:       #9CA3AF;
  --bg:           #F0EEFF;
  --card:         #FFFFFF;
  --border:       #E5E7EB;
  --radius:       20px;
  --shadow:       0 4px 28px rgba(109,40,217,.10);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
               'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── 페이지 헤더 ── */
.page-header {
  text-align: center;
  padding: 48px 20px 28px;
}
.site-label {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-light);
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
}
.page-date {
  font-size: 36px;
  font-weight: 900;
  color: var(--text-1);
  line-height: 1;
  letter-spacing: -.02em;
}
.page-sub {
  margin-top: 8px;
  font-size: 14px;
  color: var(--text-3);
}

/* ── 그리드 ── */
.grid {
  max-width: 1040px;
  margin: 0 auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
@media (max-width: 660px) {
  .grid { grid-template-columns: 1fr; }
}
.card-full { grid-column: 1 / -1; }

/* ── 카드 공통 ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-accent-bar {
  height: 4px;
  background: linear-gradient(90deg, var(--accent) 0%, #A78BFA 100%);
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px 0;
}
.badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--accent);
  background: var(--accent-light);
  padding: 3px 10px;
  border-radius: 20px;
}
.card-num {
  font-size: 12px;
  color: var(--text-4);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

/* ── 카드 본문 ── */
.card-body {
  padding: 16px 20px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.card-title {
  font-size: 21px;
  font-weight: 800;
  line-height: 1.35;
  color: var(--text-1);
  word-break: keep-all;
}
.card-subtitle {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  margin-top: -8px;
}
.divider {
  border: none;
  border-top: 1px solid var(--border);
}

/* 요약 */
.summary-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.summary-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.summary-list li {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.55;
  padding-left: 18px;
  position: relative;
}
.summary-list li::before {
  content: '▸';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-size: 12px;
  top: 2px;
}

/* 왜 중요한가 박스 */
.insight-box {
  background: var(--accent-light);
  border-radius: 12px;
  padding: 13px 15px;
}
.insight-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--accent);
  text-transform: uppercase;
  display: block;
  margin-bottom: 5px;
}
.insight-text {
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.6;
  word-break: keep-all;
}

/* ── 오늘의 키워드 섹션 ── */
.kw-section {
  max-width: 1040px;
  margin: 0 auto;
  padding: 0 20px;
}
.kw-section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.kw-section-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .1em;
  color: var(--accent);
  text-transform: uppercase;
}
.kw-section-line {
  flex: 1;
  height: 1px;
  background: var(--accent-light);
}
.kw-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (max-width: 660px) {
  .kw-list { grid-template-columns: 1fr; }
}
.kw-item {
  background: var(--card);
  border-radius: 14px;
  padding: 16px 18px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.kw-term {
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
}
.kw-full {
  font-size: 11px;
  color: var(--text-4);
  font-weight: 500;
}
.kw-desc {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
  word-break: keep-all;
}

/* 카드 푸터 */
.card-footer {
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.source-link {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  text-decoration: none;
  transition: color .15s;
}
.source-link:hover { color: var(--accent-mid); }
.source-meta {
  font-size: 12px;
  color: var(--text-4);
}

/* ── Versus 카드 ── */
.vs-grid {
  display: grid;
  grid-template-columns: 1fr 28px 1fr;
  gap: 8px;
  align-items: start;
}
.vs-col {
  background: var(--accent-xlight);
  border-radius: 12px;
  padding: 12px;
}
.vs-name {
  font-size: 13px;
  font-weight: 800;
  color: var(--text-1);
  text-align: center;
  margin-bottom: 8px;
  word-break: keep-all;
}
.vs-sep {
  font-size: 13px;
  font-weight: 900;
  color: var(--accent);
  text-align: center;
  padding-top: 14px;
}
.vs-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.vs-list li {
  font-size: 12px;
  line-height: 1.4;
  color: var(--text-2);
}
.vs-spec {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  margin-top: 6px;
  text-align: center;
}
.verdict {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
  border-radius: 12px;
  padding: 12px 15px;
  color: white;
}
.verdict-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  opacity: .75;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.verdict-text {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.4;
}

/* ── Data 카드 ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.stat-box {
  background: var(--accent-xlight);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
}
.stat-value {
  font-size: 22px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
}
.stat-unit {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
}
.stat-label {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 5px;
  line-height: 1.3;
}

/* ── Timeline 카드 ── */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.tl-item {
  display: grid;
  grid-template-columns: 56px 1px 1fr;
  gap: 0 12px;
  position: relative;
}
.tl-date {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  text-align: right;
  padding: 2px 0 16px;
  line-height: 1.2;
}
.tl-line-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.tl-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 3px;
}
.tl-line {
  flex: 1;
  width: 2px;
  background: var(--accent-light);
  min-height: 14px;
}
.tl-event {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
  padding-bottom: 16px;
}
.tl-event.current {
  font-weight: 700;
  color: var(--text-1);
}
.tl-item:last-child .tl-line { display: none; }

/* ── Explainer 카드 ── */
.one-liner {
  background: linear-gradient(135deg, var(--accent) 0%, #A78BFA 100%);
  border-radius: 12px;
  padding: 16px;
  color: white;
  text-align: center;
}
.one-liner-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  opacity: .75;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.one-liner-text {
  font-size: 15px;
  font-weight: 800;
  line-height: 1.4;
}

/* ── 내비게이션 ── */
.nav-bar {
  max-width: 1040px;
  margin: 28px auto 0;
  padding: 0 20px;
  display: flex;
  justify-content: space-between;
}
.nav-btn {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  text-decoration: none;
  background: var(--card);
  border-radius: 10px;
  padding: 9px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  transition: background .15s;
}
.nav-btn:hover { background: var(--accent-light); }
.nav-btn.disabled {
  color: var(--text-4);
  pointer-events: none;
  box-shadow: none;
}

    .idx-grid {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .idx-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border-radius: 14px;
      padding: 16px 20px;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: background .15s;
    }
    .idx-item:hover { background: var(--accent-light); }
    .idx-date { font-size: 18px; font-weight: 800; color: var(--text-1); }
    .idx-dow  { font-size: 13px; color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <header class="page-header">
    <p class="site-label">IT 카드뉴스</p>
    <h1 class="page-date">아카이브</h1>
    <p class="page-sub">지난 뉴스 모아보기</p>
  </header>
  <div class="idx-grid"><a class="idx-item" href="2026-04-17.html"><span class="idx-date">2026.04.17</span><span class="idx-dow">금요일</span></a>
</div>
</body>
</html>
