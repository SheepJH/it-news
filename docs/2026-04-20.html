<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IT 카드뉴스 — 2026-04-20</title>
<meta property="og:type" content="website">
<meta property="og:title" content="IT 카드뉴스 — 2026-04-20">
<meta property="og:image" content="https://SheepJH.github.io/it-news/2026-04-20/card_01.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://SheepJH.github.io/it-news/2026-04-20/card_01.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; font-family: sans-serif; overflow-y: auto; }
  .wrap {
    max-width: 480px; margin: 0 auto;
    background: #111;
    min-height: 100dvh;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
  }
  .topbar a.back { color: #aaa; text-decoration: none; font-size: 0.9rem; }
  a.source-link {
    color: #FFE566; text-decoration: none; font-size: 0.85rem; font-weight: 500;
  }
  .carousel-wrap { width: 100%; aspect-ratio: 1; overflow: hidden; }
  .carousel {
    display: flex; width: 100%; height: 100%;
    overflow-x: scroll; scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .carousel::-webkit-scrollbar { display: none; }
  .slide {
    min-width: 100%; height: 100%;
    scroll-snap-align: start;
    display: flex; align-items: center; justify-content: center;
  }
  .slide img { width: 100%; height: 100%; object-fit: cover; }
  .dots {
    display: flex; justify-content: center; gap: 7px;
    padding: 12px 0;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #444; transition: background 0.2s; cursor: pointer;
  }
  .dot.active { background: #FFE566; }
  .keywords {
    margin: 8px 20px 32px;
    border-top: 1px solid #2a2a2a;
    padding-top: 20px;
  }
  .kw-title {
    color: #666; font-size: 0.75rem; letter-spacing: 2px;
    margin-bottom: 14px;
  }
  .kw-item {
    display: flex; flex-direction: column; gap: 4px;
    margin-bottom: 16px;
  }
  .kw-term {
    color: #FFE566; font-size: 0.95rem; font-weight: 600;
  }
  .kw-def {
    color: #aaa; font-size: 0.85rem; line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="wrap">
  <div class="topbar">
    <a class="back" href="index.html">← 목록</a>
    <a class="source-link" href="https://www.bleepingcomputer.com/news/security/vercel-confirms-breach-as-hackers-claim-to-be-selling-stolen-data/" target="_blank">원본 기사 보기 →</a>
  </div>
  <div class="carousel-wrap">
    <div class="carousel" id="carousel">
      <div class="slide"><img src="2026-04-20/card_01.png" alt="card 1"></div>
      <div class="slide"><img src="2026-04-20/card_02.png" alt="card 2"></div>
      <div class="slide"><img src="2026-04-20/card_03.png" alt="card 3"></div>
      <div class="slide"><img src="2026-04-20/card_04.png" alt="card 4"></div>
      <div class="slide"><img src="2026-04-20/card_05.png" alt="card 5"></div>
      <div class="slide"><img src="2026-04-20/card_06.png" alt="card 6"></div>
    </div>
  </div>
  <div class="dots" id="dots">
      <span class="dot active" data-index="0"></span>
      <span class="dot" data-index="1"></span>
      <span class="dot" data-index="2"></span>
      <span class="dot" data-index="3"></span>
      <span class="dot" data-index="4"></span>
      <span class="dot" data-index="5"></span>
  </div>
  <div class="keywords">
    <div class="kw-title">핵심 키워드</div>
    <div class="kw-item"><span class="kw-term">Vercel</span><span class="kw-def">웹 앱 배포·호스팅 플랫폼</span></div>
    <div class="kw-item"><span class="kw-term">데이터 브리치</span><span class="kw-def">외부 공격으로 내부 데이터가 유출되는 보안 사고</span></div>
    <div class="kw-item"><span class="kw-term">다크웹</span><span class="kw-def">일반 브라우저로 접근 불가한 익명 인터넷 공간</span></div>
    <div class="kw-item"><span class="kw-term">Social Engineering</span><span class="kw-def">사람을 속여 정보를 탈취하는 비기술적 해킹 기법</span></div>
  </div>
  </div>
  <script>
    const carousel = document.getElementById('carousel');
    const dots = document.querySelectorAll('.dot');
    carousel.addEventListener('scroll', () => {
      const i = Math.round(carousel.scrollLeft / carousel.clientWidth);
      dots.forEach((d, j) => d.classList.toggle('active', i === j));
    }, { passive: true });
    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => {
        carousel.scrollTo({ left: carousel.clientWidth * i, behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
