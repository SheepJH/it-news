name: Daily IT 카드뉴스

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 KST 09:00 (UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write   # docs/ 푸시용

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 카드뉴스 생성
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_REPO:           ${{ secrets.GH_REPO }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: GitHub에 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📰 $(date +'%Y-%m-%d') 카드뉴스 자동 생성"
          git push

      - name: Slack 알림 (Pages 배포 대기 후 전송)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: |
          sleep 30
          python scripts/notify_slack.py

      - name: Slack 실패 알림
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_REPO:           ${{ secrets.GH_REPO }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
        run: python scripts/notify_slack_error.py
