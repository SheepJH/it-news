name: Daily IT 카드뉴스

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 KST 09:00 (UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write   # docs/ 푸시용

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 카드뉴스 생성
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GH_REPO:            ${{ secrets.GH_REPO }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: GitHub에 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📰 $(date +'%Y-%m-%d') 카드뉴스 자동 생성"
          git push

      - name: Slack 알림 (Pages 배포 대기 후 전송)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: |
          sleep 30
          python -c "
import os, sys
sys.path.insert(0, 'scripts')
from slack_notify import send_daily_card
from datetime import datetime
today = datetime.utcnow().strftime('%Y-%m-%d')
repo  = os.environ.get('GH_REPO', '')
user  = repo.split('/')[0] if '/' in repo else ''
name  = repo.split('/')[1] if '/' in repo else 'it-news'
page_url      = f'https://{user}.github.io/{name}/{today}.html'
thumbnail_url = f'https://{user}.github.io/{name}/{today}/card_01.png'
import glob
card_count = len(glob.glob(f'docs/{today}/card_*.png'))
send_daily_card(today, page_url, card_count=card_count, thumbnail_url=thumbnail_url)
          "
